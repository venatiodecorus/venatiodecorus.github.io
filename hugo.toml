baseURL = 'https://venatio.dev/'
locale = 'en-us'
title = 'venatio.dev'

[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"

languageCode = 'en-us'
defaultContentLanguage = "en-us"
enableEmoji = true

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[Languages.en-us]
  languageName = "English"
  languageCode = "en-us"
  contentDir = "content/"
  weight = 1

  [Languages.en-us.menu]
  [[Languages.en-us.menu.main]]
    pageRef="posts"
    name = 'Posts'
    url = '/posts/'
    weight = 20
  [[Languages.en-us.menu.main]]
    pageRef="services"
    name = 'Services'
    url = '/services/'
    weight = 25
  [[Languages.en-us.menu.main]]
    pageRef="about"
    name = 'About'
    url = '/about/'
    weight = 30

[Languages.en-us.params]
  sitename = "venatio.dev"
  defaultColor = "dark"
  description = "Personal site and blog"
  ogimage = "/images/og-default.png"
  mainSections = ['posts']
  toc = true
  tocOpen = true
  goToTop = false
  dateFormat = ""
  rssFeedDescription = "summary"

[Languages.en-us.params.author]
  avatar = ""
  intro = "venatio.dev"
  name = "Venatio"

[Languages.en-us.params.webmanifest]
  name = "venatio.dev"
  short_name = "venatio"
  start_url = "/"
  theme_color = "#0a0d12"
  background_color = "#0a0d12"
  display = "standalone"

# Wave interference background configuration
[params.waveBackground]
  enabled = true
  wavelength = 45
  speed = 30
  amplitude = 70
  brightness = 65
  phaseDrift = 70
  palette = "ocean"

  [[params.waveBackground.sources]]
    x = 0.28
    y = 0.42
  [[params.waveBackground.sources]]
    x = 0.72
    y = 0.42
  [[params.waveBackground.sources]]
    x = 0.5
    y = 0.7
