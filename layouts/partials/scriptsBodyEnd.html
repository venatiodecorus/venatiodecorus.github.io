{{- /*
    Overrides theme's scriptsBodyEnd.html.

    The upstream version always emits a <script src="main.min.js">, but
    in this site's configuration main.js only contains 'use strict' and
    goToTop is disabled, so the resulting bundle is a ~12 byte file that
    does nothing. We skip it here to drop one request.

    Custom additional scripts (Site.Params.additionalScripts) are still
    bundled and emitted if any are configured.
*/ -}}

{{- $custom := slice -}}
{{- range $script := .Site.Params.additionalScripts -}}
    {{- $script_res := resources.Get $script -}}
    {{- if not $script_res -}}
        {{- erroridf "additional-script-loading-error" "Failed to load script \"%s\"" $script -}}
    {{- else -}}
        {{- $custom = $custom | append $script_res -}}
    {{- end -}}
{{- end -}}

{{- if gt (len $custom) 0 -}}
    {{- if hugo.IsProduction -}}
        {{- $custom = $custom | resources.Concat "js/custom.js" | resources.Minify | resources.Fingerprint -}}
        <script src="{{ $custom.Permalink }}" integrity="{{ $custom.Data.Integrity }}"></script>
    {{- else -}}
        {{- $custom = $custom | resources.Concat "js/custom.js" -}}
        <script async src="{{ $custom.Permalink }}"></script>
    {{- end -}}
{{- end -}}
